# TCG Drop Monitor — watch list (design rule #5: config-driven targets).
#
# Adding the next set = adding entries here, no code changes. Each target
# maps to a fetcher by name (see `python -m tcgmon --list`).
#
# Tiers (poll cadence):
#   Tier 1 aggregate intelligence ........ 15–60 min  (reddit_json, rss)
#   Tier 2 SKU watchers .................. 5–15 min   (shopify_json, bestbuy_api, ...)
#
# Polite tier (official APIs / JSON) can run fast; bot-protected HTML
# (Pokémon Center, Walmart, Target) stays slow and fails soft to UNKNOWN.

targets:
  # ─── Tier 1: aggregate intelligence (enabled — this is Phase 1) ─────────
  - name: reddit-pkmntcgdeals
    fetcher: reddit_browser
    url: https://www.reddit.com/r/PKMNTCGDeals/new.json?limit=25
    interval_minutes: 10
    keywords: [preorder, pre-order, restock, "in stock", live, ETB, "elite trainer"]

  - name: reddit-pokemontcg
    fetcher: reddit_browser
    url: https://www.reddit.com/r/PokemonTCG/new.json?limit=25
    interval_minutes: 15
    keywords: [preorder, pre-order, restock, "in stock", live, ETB, "elite trainer"]

  - name: pokebeach-news
    fetcher: rss
    # PokeBeach runs XenForo, not WordPress — the /feed URL in the spec is a
    # broken WP endpoint (500/403). This is the real forum-wide RSS feed.
    url: https://www.pokebeach.com/forums/forum/-/index.rss
    interval_minutes: 20
    # The forum-wide feed is noisy (deck help, reveals, chatter). Filter to
    # an actual *buyable* signal AND the set we're hunting:
    #   (any purchase signal)  AND  (the set name)
    # To track the next set, swap the `require` line — no code changes.
    keywords: [preorder, pre-order, "pre order", "now live", "now available",
               "available now", "in stock", restock, "on sale", "live on"]
    require: ["pitch black"]

  # ─── Tier 2: the easy wins (Phase 2 — enable when you have a key/URLs) ──
  # Best Buy: the only real official API. Set BESTBUY_API_KEY in .env.
  # Limits are generous (50k/day, 5/sec) so 5-min polling is safe.
  # Discovery mode — fuzzy search until you know the SKUs:
  - name: bestbuy-etb-search
    fetcher: bestbuy_api
    interval_minutes: 5
    enabled: false
    options:
      search: pokemon elite trainer
  # Precise mode — watch exact SKUs in ONE call via the in() operator.
  # Fill `skus` from the search results, then prefer this over search.
  - name: bestbuy-pitch-black
    fetcher: bestbuy_api
    interval_minutes: 5
    enabled: false
    options:
      skus: []   # e.g. [6588509, 6588510]

  # Shopify storefronts expose {product_url}.js (availability + cents price).
  # These two carry real Pitch Black ETB listings and connect over plain HTTP.
  - name: galactic-toys
    fetcher: shopify_json
    url: https://galactictoys.com/products/pre-order-july-2026-pokemon-tcg-mega-evolutions-pitch-black-me05-elite-trainer-box
    interval_minutes: 10
    enabled: true

  - name: rocket-city-toys
    fetcher: shopify_json
    url: https://www.rocketcitytoys.com/products/pok-mon-tcg-mega-evolution-pitch-black-elite-trainer-box
    interval_minutes: 10
    enabled: true

  # Custom storefronts with no JSON — generic add-to-cart text scrape.
  - name: dacardworld
    fetcher: html_button
    url: https://www.dacardworld.com/gaming/pokemon-mega-evolution-pitch-black-elite-trainer-box
    interval_minutes: 15
    enabled: false

  # ─── Tier 2: bot-protected (Phase 3 — slow, fail-soft, off by default) ──
  # Pokémon Center: official MSRP source, heavily Akamai-protected. Watches
  # the CATEGORY page for new product tiles (a new SKU = a drop). Runs a
  # headed real-Chrome window (headless is detected); a challenge yields no
  # observations, never a false signal. Enable on a residential machine.
  - name: pokecenter-etb
    fetcher: pokemoncenter
    url: https://www.pokemoncenter.com/category/elite-trainer-box
    interval_minutes: 12
    enabled: false
    keywords: []   # e.g. [pitch black, "elite trainer"] to narrow the grid
    options:
      settle_ms: 7000
      tiles_timeout_ms: 15000
      headless: false


  - name: walmart-etb
    fetcher: nextdata
    url: https://www.walmart.com/ip/PLACEHOLDER/000000000
    interval_minutes: 15
    enabled: false

  # Target — Pitch Black standard ETB, discovered live 2026-06-12.
  # Availability comes from product_fulfillment_v1 (shipping_options); the
  # public web `key` ships baked-in as a default, so none is needed here.
  # Currently OUT_OF_STOCK (street date 2026-07-17) — armed, fires on flip.
  - name: target-etb
    fetcher: redsky
    url: https://www.target.com/p/pok-233-mon-trading-card-game-mega-evolution-pitch-black-elite-trainer-box/-/A-1011483406
    interval_minutes: 10
    enabled: true
    options:
      tcin: "1011483406"
